<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四素句魔法廚房 - 合理菜式版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #fffaf0; 
            font-family: "標楷體", "DFKai-SB", "BiauKai", "Microsoft JhengHei", serif; 
            touch-action: manipulation;
        }

        /* 碗的視覺設計 - 強化碗的造型 */
        .magic-bowl {
            position: relative;
            background: white;
            border: 4px solid #94a3b8;
            border-radius: 10px 10px 120px 120px; /* 深碗弧度 */
            padding: 25px 15px 45px 15px;
            min-height: 240px;
            box-shadow: inset 0 -20px 0 rgba(241, 245, 249, 0.9), 0 8px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s ease;
        }
        
        /* 碗底座腳 */
        .magic-bowl::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 45%;
            height: 10px;
            background: #64748b;
            border-radius: 0 0 15px 15px;
        }

        .magic-card { 
            transition: all 0.2s; 
            cursor: pointer; 
            user-select: none;
            z-index: 10;
        }
        
        .magic-card.selected { 
            background-color: #fef08a !important; 
            border-color: #ca8a04 !important; 
            transform: translateY(-5px);
            box-shadow: 0 4px 8px rgba(202, 138, 4, 0.3);
        }

        .wok-area { 
            background: #334155; 
            border-radius: 40% 40% 15% 15%; 
            min-height: 200px; 
            border-bottom: 12px solid #1e293b; 
            box-shadow: inset 0 8px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        @keyframes steam {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-60px) scale(1.8); opacity: 0; }
        }
        .steam-effect {
            position: absolute;
            top: -20px;
            font-size: 2.5rem;
            animation: steam 2s infinite;
        }

        .logic-hint-box {
            padding: 1.2rem;
            margin-top: 1rem;
            border-radius: 1.2rem;
            border-left: 10px solid;
            text-align: left;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto text-center mb-8">
        <h1 class="text-4xl md:text-6xl font-bold text-amber-900 mb-6 flex justify-center items-center gap-4">
            🥣 <span>四素句魔法廚房</span> 🍳
        </h1>
        
        <div class="flex flex-wrap justify-center gap-4 mb-6">
            <button onclick="switchLevel(1)" id="btn-lv1" class="level-btn px-8 py-3 rounded-full font-bold border-2 transition-all shadow-sm">初階：食材分類</button>
            <button onclick="switchLevel(2)" id="btn-lv2" class="level-btn px-8 py-3 rounded-full font-bold border-2 transition-all shadow-sm">中階：魔法新手 (3選1)</button>
            <button onclick="switchLevel(3)" id="btn-lv3" class="level-btn px-8 py-3 rounded-full font-bold border-2 transition-all shadow-sm">高階：魔法大師 (6選1)</button>
        </div>

        <div id="instruction-box" class="bg-amber-100 border-2 border-amber-200 text-amber-900 p-4 rounded-3xl inline-block px-12 shadow-md">
            <span id="level-task" class="text-xl font-bold italic text-amber-800">準備好食材，開始烹飪吧！</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <!-- 魔法四碗區域 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 mb-12">
            <div class="flex flex-col gap-3">
                <div class="text-center font-bold text-rose-700 text-2xl">⏰ 時間碗</div>
                <div id="bowl-time" class="magic-bowl"></div>
            </div>
            <div class="flex flex-col gap-3">
                <div class="text-center font-bold text-sky-700 text-2xl">👤 人物碗</div>
                <div id="bowl-person" class="magic-bowl"></div>
            </div>
            <div class="flex flex-col gap-3">
                <div class="text-center font-bold text-emerald-700 text-2xl">📍 地點碗</div>
                <div id="bowl-place" class="magic-bowl"></div>
            </div>
            <div class="flex flex-col gap-3">
                <div class="text-center font-bold text-amber-700 text-2xl">🎯 事情碗</div>
                <div id="bowl-action" class="magic-bowl"></div>
            </div>
        </div>

        <!-- 儲藏室區域 (初階用) -->
        <div id="storage-container" class="mb-10">
            <h3 class="text-center text-slate-500 font-bold mb-4 text-lg">📦 食材儲藏室 (點擊食材把他們裝進碗裡)</h3>
            <div id="storage" class="bg-slate-100 border-4 border-dashed border-slate-300 rounded-[3rem] p-10 flex flex-wrap justify-center gap-4 min-h-[150px]"></div>
        </div>

        <!-- 烹飪區 (中高階用) -->
        <div id="cooking-container" class="grid grid-cols-1 lg:grid-cols-2 gap-10 hidden">
            <div class="flex flex-col items-center">
                <h3 class="text-slate-600 font-bold mb-3 text-lg">🔥 魔法炒鍋 (放入四種食材)</h3>
                <div id="wok" class="wok-area w-full flex flex-wrap items-center justify-center p-8 gap-4 mb-8">
                    <div id="wok-placeholder" class="text-slate-400 italic text-xl">點選上方碗裡的食材入鍋...</div>
                    <div id="wok-content" class="flex flex-wrap justify-center gap-3"></div>
                </div>
                <div class="flex gap-6">
                    <button id="cook-btn" class="bg-orange-600 text-white px-12 py-5 rounded-3xl text-3xl font-bold shadow-2xl hover:bg-orange-700 active:scale-95 transition-transform border-b-8 border-orange-800">♨️ 開始烹煮</button>
                    <button onclick="resetAll()" class="bg-white text-slate-500 border-2 border-slate-200 px-8 py-5 rounded-3xl font-bold text-lg hover:bg-slate-50 shadow-sm">倒掉重來</button>
                </div>
            </div>
            
            <div id="ai-panel" class="bg-white rounded-[3rem] p-10 border-4 border-orange-100 shadow-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-6 opacity-10 text-7xl">👨‍🍳</div>
                <h3 class="text-3xl font-bold text-orange-900 mb-6">主廚點評：</h3>
                <div id="feedback-content" class="text-slate-500 text-xl leading-relaxed italic">
                    一道完美的四素菜式需要「時間、人物、地點、事情」完美搭配。請挑選你的食材！
                </div>
            </div>
        </div>
    </main>

    <!-- 結果彈窗 -->
    <div id="modal" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-white rounded-[4rem] p-12 max-w-xl w-full text-center shadow-2xl border-[12px] border-orange-50">
            <div id="res-emoji" class="text-8xl mb-6">🍲</div>
            <h2 id="res-title" class="text-4xl font-bold mb-6 text-orange-950">菜式完成！</h2>
            <div id="res-sentence" class="bg-orange-50 p-8 rounded-3xl text-3xl mb-8 font-bold text-orange-950 border-2 border-orange-200 leading-relaxed shadow-inner"></div>
            <p id="res-feedback" class="text-2xl text-slate-700 mb-10 leading-snug"></p>
            <button onclick="closeModal()" class="bg-orange-600 text-white w-full py-5 rounded-3xl font-bold text-2xl shadow-xl hover:bg-orange-700 active:scale-95 transition-transform">下一道菜式</button>
        </div>
    </div>

    <script>
        const ingredients = [
            // 中階 (魔法新手)
            { type: 'time', word: '小息的時候', lv: 2, set: 'school' },
            { type: 'time', word: '晚飯過後', lv: 2, set: 'home' },
            { type: 'time', word: '週末早晨', lv: 2, set: 'sport' },
            { type: 'person', word: '同學們', lv: 2, set: 'school' },
            { type: 'person', word: '爸爸和媽媽', lv: 2, set: 'home' },
            { type: 'person', word: '哥哥', lv: 2, set: 'sport' },
            { type: 'place', word: '在操場上', lv: 2, set: 'school' },
            { type: 'place', word: '在客廳裡', lv: 2, set: 'home' },
            { type: 'place', word: '在游泳池', lv: 2, set: 'sport' },
            { type: 'action', word: '開心地玩捉迷藏', lv: 2, set: 'school' },
            { type: 'action', word: '一起看電視節目', lv: 2, set: 'home' },
            { type: 'action', word: '練習自由式', lv: 2, set: 'sport' },

            // 高階 (魔法大師)
            { type: 'time', word: '在炎熱的下午', lv: 3 },
            { type: 'time', word: '在寂靜的深夜', lv: 3 },
            { type: 'time', word: '清晨五時許', lv: 3 },
            { type: 'person', word: '辛勤的環保工人', lv: 3 },
            { type: 'person', word: '頑皮的小貓', lv: 3 },
            { type: 'person', word: '勇敢的救生員', lv: 3 },
            { type: 'place', word: '在街道兩旁', lv: 3 },
            { type: 'place', word: '在我的床墊下', lv: 3 },
            { type: 'place', word: '在海邊的崗亭', lv: 3 },
            { type: 'action', word: '安靜地打掃街道', lv: 3 },
            { type: 'action', word: '悄悄地藏起襪子', lv: 3 },
            { type: 'action', word: '專心地觀察海面', lv: 3 }
        ];

        const logicalPairs = {
            '在操場上': ['開心地玩捉迷藏'],
            '在客廳裡': ['一起看電視節目'],
            '在游泳池': ['練習自由式'],
            '在街道兩旁': ['安靜地打掃街道'],
            '在我的床墊下': ['悄悄地藏起襪子'],
            '在海邊的崗亭': ['專心地觀察海面'],
            '勇敢的救生員': ['專心地觀察海面', '練習自由式'],
            '辛勤的環保工人': ['安靜地打掃街道'],
            '頑皮的小貓': ['悄悄地藏起襪子', '開心地玩捉迷藏']
        };

        let currentLevel = 1;
        let selections = { time: null, person: null, place: null, action: null };
        let classifiedCount = 0;

        function switchLevel(lv) {
            currentLevel = lv;
            resetAll();
            
            document.querySelectorAll('.level-btn').forEach((btn, i) => {
                if(i + 1 === lv) {
                    btn.classList.add('bg-amber-800', 'text-white', 'border-amber-950', 'scale-105', 'shadow-lg');
                    btn.classList.remove('bg-white', 'text-amber-800');
                } else {
                    btn.classList.remove('bg-amber-800', 'text-white', 'border-amber-950', 'scale-105', 'shadow-lg');
                    btn.classList.add('bg-white', 'text-amber-800');
                }
            });
            
            const task = document.getElementById('level-task');
            if(lv === 1) {
                task.innerText = "初階任務：請把儲藏室的食材分類放入對應的碗中！";
                document.getElementById('storage-container').classList.remove('hidden');
                document.getElementById('cooking-container').classList.add('hidden');
                renderStorage();
            } else if(lv === 2) {
                task.innerText = "中階任務（魔法新手）：從碗中挑選，看誰能做出合理的四素菜式！";
                document.getElementById('storage-container').classList.add('hidden');
                document.getElementById('cooking-container').classList.remove('hidden');
                renderOptions(3);
            } else {
                task.innerText = "高階任務（魔法大師）：食材變得複雜了，你能做出最完美的菜式嗎？";
                document.getElementById('storage-container').classList.add('hidden');
                document.getElementById('cooking-container').classList.remove('hidden');
                renderOptions(6);
            }
        }

        function renderStorage() {
            const s = document.getElementById('storage');
            s.innerHTML = '';
            ingredients.slice(0, 12).sort(() => Math.random() - 0.5).forEach(item => {
                const card = createCard(item);
                card.onclick = () => {
                    const bowl = document.getElementById(`bowl-${item.type}`);
                    const cardInBowl = createCard(item);
                    cardInBowl.className = "bg-white border-2 border-slate-100 rounded-lg p-2 font-bold text-center text-sm shadow-sm opacity-0 transform scale-50 transition-all duration-300";
                    bowl.appendChild(cardInBowl);
                    setTimeout(() => cardInBowl.classList.remove('opacity-0', 'scale-50'), 50);
                    
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.5)';
                    setTimeout(() => card.remove(), 200);
                    classifiedCount++;
                    if(classifiedCount >= 12) {
                        document.getElementById('level-task').innerText = "食材已歸位！可以嘗試挑戰「魔法新手」菜式了！";
                    }
                };
                s.appendChild(card);
            });
        }

        function renderOptions(count) {
            ['time', 'person', 'place', 'action'].forEach(type => {
                const bowl = document.getElementById(`bowl-${type}`);
                bowl.innerHTML = '';
                let pool = ingredients.filter(i => i.type === type);
                if(currentLevel === 2) pool = pool.filter(i => i.lv === 2);
                
                pool.slice(0, count).forEach(item => {
                    const card = createCard(item);
                    card.onclick = () => {
                        bowl.querySelectorAll('.magic-card').forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');
                        selections[type] = item.word;
                        updateWok();
                    };
                    bowl.appendChild(card);
                });
            });
        }

        function createCard(item) {
            const div = document.createElement('div');
            div.className = "magic-card bg-white border-2 border-slate-200 rounded-2xl p-4 font-bold text-center shadow-md hover:border-orange-500 hover:shadow-lg transition-all text-lg";
            div.innerText = item.word;
            return div;
        }

        function updateWok() {
            const content = document.getElementById('wok-content');
            content.innerHTML = '';
            let count = 0;
            ['time', 'person', 'place', 'action'].forEach(t => {
                if(selections[t]) {
                    const tag = document.createElement('div');
                    tag.className = "bg-orange-50 text-orange-950 border-2 border-orange-200 px-6 py-3 rounded-2xl font-bold shadow-md animate-bounce text-xl";
                    tag.innerText = selections[t];
                    content.appendChild(tag);
                    count++;
                }
            });
            document.getElementById('wok-placeholder').style.display = count > 0 ? 'none' : 'block';
        }

        document.getElementById('cook-btn').onclick = () => {
            if(!selections.time || !selections.person || !selections.place || !selections.action) {
                document.getElementById('feedback-content').innerText = "哎呀！這道菜少了一種食材，四素菜式必須包含「時間、人物、地點、事情」喔！";
                return;
            }
            
            const wok = document.getElementById('wok');
            for(let i=0; i<5; i++) {
                const steam = document.createElement('div');
                steam.className = "steam-effect";
                steam.innerText = "☁️";
                steam.style.left = (20 + Math.random() * 60) + "%";
                wok.appendChild(steam);
                setTimeout(() => steam.remove(), 2000);
            }

            setTimeout(validateSentence, 800);
        };

        function validateSentence() {
            const s = selections;
            const sentence = `${s.time}，${s.person}${s.place}${s.action}。`;
            let isOk = true;
            let msg = "這道菜式的「四素」比例完美，食材搭配合理，是一道五星級的句子！";

            if (logicalPairs[s.place] && !logicalPairs[s.place].includes(s.action)) {
                isOk = false;
                msg = `食材打架了！在「${s.place}」做「${s.action}」不太合胃口，試著換個搭配吧！`;
            } else if (logicalPairs[s.person] && !logicalPairs[s.person].includes(s.action)) {
                isOk = false;
                msg = `主廚提醒你：「${s.person}」這時候去做「${s.action}」有點奇怪，味道不對喔。`;
            }

            document.getElementById('feedback-content').innerHTML = `
                <div class="logic-hint-box ${isOk ? 'bg-emerald-50 border-emerald-600 text-emerald-800' : 'bg-rose-50 border-rose-600 text-rose-800'}">
                    <p class="font-bold text-2xl mb-2">${isOk ? '✨ 絕佳風味！' : '❌ 味道不合...'}</p>
                    <p>${msg}</p>
                </div>
            `;

            document.getElementById('res-title').innerText = isOk ? "菜式大獲好評！" : "菜式需要改良";
            document.getElementById('res-emoji').innerText = isOk ? "🌟" : "🍲";
            document.getElementById('res-sentence').innerText = sentence;
            document.getElementById('res-feedback').innerText = msg;
            document.getElementById('modal').classList.remove('hidden');
        }

        function resetAll() {
            selections = { time: null, person: null, place: null, action: null };
            classifiedCount = 0;
            document.querySelectorAll('.magic-bowl').forEach(b => b.innerHTML = '');
            updateWok();
            document.getElementById('feedback-content').innerHTML = "一道完美的四素菜式需要「時間、人物、地點、事情」完美搭配。請挑選你的食材！";
            if(currentLevel === 1) renderStorage();
            else renderOptions(currentLevel === 2 ? 3 : 6);
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        
        window.onload = () => switchLevel(1);
    </script>
</body>
</html>
