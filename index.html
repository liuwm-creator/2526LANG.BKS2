<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四素句魔法廚房 - 合成魔法版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #fdfcf0; 
            font-family: "標楷體", "DFKai-SB", "BiauKai", "Microsoft JhengHei", serif; 
            touch-action: manipulation;
        }

        .magic-card { transition: all 0.2s; cursor: pointer; user-select: none; }
        .magic-card.selected { 
            background-color: #fef08a !important; 
            border-color: #ca8a04 !important; 
            transform: translateY(-5px);
            box-shadow: 0 4px 12px rgba(202, 138, 4, 0.2);
        }

        .bowl { 
            background: white; border: 4px solid #e2e8f0; border-radius: 2rem; 
            padding: 1rem; min-height: 180px; display: flex; flex-direction: column; gap: 8px;
        }

        .wok-area { 
            background: #475569; 
            border-radius: 40% 40% 15% 15%; 
            min-height: 180px; 
            border-bottom: 12px solid #334155; 
            box-shadow: inset 0 6px 15px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .storage-area { 
            background-color: #ffffff; 
            border: 4px dashed #cbd5e1; 
            border-radius: 2.5rem; 
            min-height: 150px; 
        }

        @keyframes spell-glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; transform: scale(1.05); } }
        .magic-glow { animation: spell-glow 0.8s infinite; }

        .logic-hint-box {
            padding: 1.25rem;
            margin-top: 1rem;
            border-radius: 1.25rem;
            border-left: 10px solid;
            text-align: left;
            line-height: 1.6;
        }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800">

    <header class="max-w-6xl mx-auto text-center mb-10">
        <h1 class="text-4xl font-bold text-amber-700 mb-6">🔮 四素句魔法廚房 🔮</h1>
        <div class="flex flex-wrap justify-center gap-3 mb-6">
            <button onclick="switchLevel(1)" id="btn-lv1" class="level-btn px-6 py-2 rounded-full font-bold border-2">初階：食材分類</button>
            <button onclick="switchLevel(2)" id="btn-lv2" class="level-btn px-6 py-2 rounded-full font-bold border-2">中階：合成魔法</button>
            <button onclick="switchLevel(3)" id="btn-lv3" class="level-btn px-6 py-2 rounded-full font-bold border-2">高階：魔法大師</button>
        </div>
        <div id="instruction-box" class="bg-amber-600 text-white p-4 rounded-2xl inline-block px-10 shadow-lg border-b-4 border-amber-800">
            <span id="level-task" class="text-xl font-bold">正在準備魔法食材...</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <!-- 碗部區域 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="flex flex-col gap-2">
                <div class="text-center font-bold text-rose-600 text-xl">⏰ 時間</div>
                <div id="bowl-time" class="bowl"></div>
            </div>
            <div class="flex flex-col gap-2">
                <div class="text-center font-bold text-sky-600 text-xl">👤 人物</div>
                <div id="bowl-person" class="bowl"></div>
            </div>
            <div class="flex flex-col gap-2">
                <div class="text-center font-bold text-emerald-600 text-xl">📍 地點</div>
                <div id="bowl-place" class="bowl"></div>
            </div>
            <div class="flex flex-col gap-2">
                <div class="text-center font-bold text-amber-600 text-xl">🎯 事情</div>
                <div id="bowl-action" class="bowl"></div>
            </div>
        </div>

        <!-- 儲藏區 -->
        <div id="storage-container" class="mb-8">
            <div id="storage" class="storage-area p-6 flex flex-wrap justify-center gap-3"></div>
        </div>

        <!-- 烹飪與提示區域 -->
        <div id="cooking-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8 hidden">
            <div class="flex flex-col items-center">
                <div id="wok" class="wok-area w-full flex flex-wrap items-center justify-center p-6 gap-3 mb-6">
                    <div id="wok-placeholder" class="text-slate-300 italic text-lg">放入四種魔法食材，準備合成魔法！</div>
                    <div id="wok-content" class="flex flex-wrap justify-center gap-2"></div>
                </div>
                <div class="flex gap-4">
                    <button id="cook-btn" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl text-2xl font-bold shadow-lg hover:bg-indigo-700 transition-colors border-b-4 border-indigo-900">✨ 開始合成魔法</button>
                    <button onclick="resetAll()" class="bg-slate-200 text-slate-600 px-6 py-4 rounded-2xl font-bold hover:bg-slate-300">清空食材</button>
                </div>
            </div>
            
            <div id="ai-panel" class="bg-white rounded-3xl p-8 border-2 border-amber-100 shadow-inner min-h-[300px]">
                <h3 class="text-2xl font-bold text-amber-800 mb-4">🧙‍♂️ 魔法廚師的回應：</h3>
                <div id="feedback-content" class="text-slate-500 text-lg italic leading-relaxed">
                    請選好魔法碗裡的食材，我就能為你施展合成魔法！
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-lg w-full text-center shadow-2xl">
            <div id="res-emoji" class="text-7xl mb-4">✨</div>
            <h2 id="res-title" class="text-3xl font-bold mb-4 text-amber-700"></h2>
            <div id="res-sentence" class="bg-amber-50 p-6 rounded-2xl text-2xl mb-6 font-bold border-2 border-amber-100 text-slate-800 leading-normal"></div>
            <p id="res-feedback" class="text-xl text-slate-600 mb-8 px-4"></p>
            <button onclick="closeModal()" class="bg-amber-600 text-white w-full py-4 rounded-2xl font-bold text-xl hover:bg-amber-700 shadow-lg">繼續修煉魔法</button>
        </div>
    </div>

    <script>
        const logicRules = {
            '在圖書館': {
                allowed: ['專心地看書', '安靜地睡覺'],
                reason: '圖書館需要保持安靜，適合看書。在那裡忙著煮麵或練習游泳會干擾到別人喔！'
            },
            '在廚房裏': {
                allowed: ['忙着煮麵', '安靜地睡覺'],
                reason: '廚房是用來準備美味食物的地方。在那裡踢球或練習游泳太危險了！'
            },
            '在操場上': {
                allowed: ['快樂地踢球', '專心地看書'],
                reason: '操場空間廣闊，最適合運動。雖然也能看書，但不能在那裡煮麵或練習游泳。'
            },
            '在游泳池': {
                allowed: ['練習游泳'],
                reason: '游泳池是玩水的地方。在水裡沒辦法煮麵，書本也會濕透的！'
            },
            '在電影院': {
                allowed: ['安靜地睡覺', '專心地看書'],
                reason: '電影院裡很安靜，適合休息。但那裡不是做運動或煮東西的地方。'
            }
        };

        const personRules = {
            '小貓': {
                allowed: ['安靜地睡覺', '快樂地踢球'],
                reason: '小貓會玩球和睡覺，但牠們沒辦法讀書、煮麵或去游泳訓練。'
            },
            '機器人': {
                allowed: ['忙着煮麵', '專心地看書', '練習游泳'],
                reason: '機器人可以學會很多技能，但它們不需要睡覺。'
            }
        };

        const ingredients = [
            { type: 'time', word: '今天早上' }, { type: 'time', word: '放學以後' }, { type: 'time', word: '暑假期間' },
            { type: 'person', word: '爸爸' }, { type: 'person', word: '小貓' }, { type: 'person', word: '機器人' },
            { type: 'place', word: '在圖書館' }, { type: 'place', word: '在廚房裏' }, { type: 'place', word: '在游泳池' },
            { type: 'action', word: '專心地看書' }, { type: 'action', word: '忙着煮麵' }, { type: 'action', word: '練習游泳' },
            { type: 'action', word: '快樂地踢球' }, { type: 'action', word: '安靜地睡覺' },
            { type: 'place', word: '在操場上' }, { type: 'place', word: '在電影院' }
        ];

        let currentLevel = 1;
        let selections = { time: null, person: null, place: null, action: null };
        let classifiedCount = 0;

        function switchLevel(lv) {
            currentLevel = lv;
            resetAll();
            document.querySelectorAll('.level-btn').forEach((btn, i) => {
                btn.className = `level-btn px-6 py-2 rounded-full font-bold border-2 transition-all ${i+1===lv ? 'bg-amber-600 text-white border-amber-700 shadow-md' : 'bg-white text-amber-400 border-amber-100 hover:border-amber-300'}`;
            });
            
            const task = document.getElementById('level-task');
            if(lv === 1) {
                task.innerText = "第一階段：請將食材分類到正確的魔法碗裡！";
                document.getElementById('storage-container').classList.remove('hidden');
                document.getElementById('cooking-container').classList.add('hidden');
                renderStorage();
            } else {
                task.innerText = lv === 2 ? "第二階段：施展魔法，合成一個合理的句子！" : "第三階段：魔法大師挑戰，找出最完美的邏輯！";
                document.getElementById('storage-container').classList.add('hidden');
                document.getElementById('cooking-container').classList.remove('hidden');
                renderOptions();
            }
        }

        function renderStorage() {
            const s = document.getElementById('storage');
            s.innerHTML = '';
            ingredients.slice(0, 12).forEach(item => {
                const card = createCard(item);
                card.onclick = () => {
                    const bowl = document.getElementById(`bowl-${item.type}`);
                    const ghost = card.cloneNode(true);
                    ghost.className = "bg-slate-50 border-2 border-slate-100 rounded-xl p-2 text-sm opacity-50 cursor-default";
                    bowl.appendChild(ghost);
                    card.remove();
                    classifiedCount++;
                    if(classifiedCount >= 12) {
                        document.getElementById('level-task').innerText = "分類完成！點擊上方按鈕進入「合成魔法」挑戰！";
                    }
                };
                s.appendChild(card);
            });
        }

        function renderOptions() {
            ['time', 'person', 'place', 'action'].forEach(type => {
                const bowl = document.getElementById(`bowl-${type}`);
                bowl.innerHTML = '';
                const pool = (currentLevel === 3) ? ingredients : ingredients.slice(0, 12);
                pool.filter(i => i.type === type).forEach(item => {
                    const card = createCard(item);
                    card.onclick = () => {
                        bowl.querySelectorAll('.magic-card').forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');
                        selections[type] = item.word;
                        updateWok();
                    };
                    bowl.appendChild(card);
                });
            });
        }

        function createCard(item) {
            const div = document.createElement('div');
            div.className = "magic-card bg-white border-2 border-slate-200 rounded-xl p-3 font-bold text-center shadow-sm hover:border-amber-400";
            div.innerText = item.word;
            return div;
        }

        function updateWok() {
            const content = document.getElementById('wok-content');
            content.innerHTML = '';
            let filled = 0;
            ['time', 'person', 'place', 'action'].forEach(t => {
                if(selections[t]) {
                    const tag = document.createElement('div');
                    tag.className = "bg-amber-100 text-amber-900 border-2 border-amber-300 px-4 py-2 rounded-xl font-bold shadow-sm";
                    tag.innerText = selections[t];
                    content.appendChild(tag);
                    filled++;
                }
            });
            document.getElementById('wok-placeholder').style.display = filled > 0 ? 'none' : 'block';
        }

        document.getElementById('cook-btn').onclick = () => {
            if(!selections.time || !selections.person || !selections.place || !selections.action) {
                document.getElementById('feedback-content').innerHTML = "<span class='text-rose-500 font-bold'>魔法還沒準備好！請選齊四種魔法食材喔！</span>";
                return;
            }

            const wok = document.getElementById('wok');
            wok.classList.add('magic-glow');
            
            setTimeout(() => {
                wok.classList.remove('magic-glow');
                checkLogic();
            }, 600);
        };

        function checkLogic() {
            const sentence = `${selections.time}，${selections.person}${selections.place}${selections.action}。`;
            let isOk = true;
            let feedback = "這是一個非常合理的句子！你的邏輯感像魔法一樣精準。";
            let emoji = "✨";
            let title = "魔法合成成功！";

            const placeRule = logicRules[selections.place];
            if (placeRule && !placeRule.allowed.includes(selections.action)) {
                isOk = false;
                feedback = placeRule.reason;
                title = "魔法失去平衡...";
                emoji = "❓";
            }

            if (isOk) {
                const pRule = personRules[selections.person];
                if (pRule && !pRule.allowed.includes(selections.action)) {
                    isOk = false;
                    feedback = pRule.reason;
                    title = "魔法不太協調...";
                    emoji = "🐱";
                }
            }

            const aiPanel = document.getElementById('feedback-content');
            aiPanel.innerHTML = `
                <div class="logic-hint-box ${isOk ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'bg-rose-50 border-rose-500 text-rose-700'}">
                    <p class="font-bold text-xl mb-1">${isOk ? '✅ 魔法生效' : '❌ 魔法失效'}</p>
                    <p class="text-lg">${feedback}</p>
                </div>
            `;

            document.getElementById('res-title').innerText = title;
            document.getElementById('res-emoji').innerText = emoji;
            document.getElementById('res-sentence').innerText = sentence;
            document.getElementById('res-feedback').innerText = isOk ? "你成功合成了一個好句子！" : feedback;
            document.getElementById('modal').classList.remove('hidden');
        }

        function resetAll() {
            selections = { time: null, person: null, place: null, action: null };
            classifiedCount = 0;
            document.querySelectorAll('.bowl').forEach(b => b.innerHTML = '');
            updateWok();
            document.getElementById('feedback-content').innerHTML = "請選好魔法碗裡的食材，我就能為你施展合成魔法！";
            if(currentLevel === 1) renderStorage();
            else renderOptions();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        window.onload = () => switchLevel(1);
    </script>
</body>
</html>
